name: PR Check (fast signal)

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build + Test + Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build (Android + compile check)
        run: ./gradlew :composeApp:compileAndroidMain :androidApp:compileDebugKotlin --console=plain

      - name: Run commonTest (desktop JVM — fast)
        run: ./gradlew :composeApp:desktopTest --console=plain

      - name: Coverage verify
        run: ./gradlew :androidApp:koverVerify --console=plain

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-html-report
          path: androidApp/build/reports/kover/html/
